<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <title>人性之境：古聖先賢的靈魂考驗</title>
    <style>
        :root {
            --primary-color: #2c2c2c;
            --accent-color: #5c4b3a; /* 深木墨色 */
            --bg-color: #f2ede4;
            --ink-color: #1a1a1a;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Noto Serif TC', serif;
            background-color: var(--bg-color);
            color: var(--ink-color);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0.6; z-index: -1;
        }

        /* 首頁 */
        #landing-page {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            transition: opacity 1s ease;
        }

        .title-box {
            border: 2px solid var(--ink-color);
            padding: 40px; margin-bottom: 30px; position: relative;
        }

        .intro-text {
            max-width: 500px; font-size: 1.1rem; line-height: 2.2;
            letter-spacing: 2px; color: #444; margin-bottom: 40px; padding: 0 20px;
        }

        .start-btn {
            background: var(--ink-color); color: white; border: none;
            padding: 15px 50px; font-size: 1.2rem; cursor: pointer;
            letter-spacing: 5px; font-family: 'Noto Serif TC', serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 水墨進度條核心設計 */
        .progress-container {
            width: 100%; max-width: 500px; margin: 0 auto 40px auto;
            text-align: center; display: none;
        }

        .progress-text {
            font-size: 0.95rem; color: #7a6a5a; letter-spacing: 4px;
            margin-bottom: 12px; font-style: italic;
        }

        .ink-path-bg {
            width: 100%; height: 15px; background: rgba(0,0,0,0.03);
            border-radius: 20px; position: relative; overflow: hidden;
        }

        .ink-brush-fill {
            height: 100%; width: 0%;
            background-color: #1a1a1a;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            /* 關鍵：水墨遮罩效果 */
            mask-image: linear-gradient(to right, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%);
        }

        /* 墨痕的波動動畫 */
        .ink-brush-fill::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent 25%, rgba(255,255,255,0.1) 50%, transparent 75%);
            background-size: 50px 50px;
            animation: inkWave 3s infinite linear;
            opacity: 0.5;
        }

        @keyframes inkWave {
            0% { background-position: 0 0; }
            100% { background-position: 100px 0; }
        }

        /* 墨滴點綴 */
        .ink-dot {
            position: absolute; right: -5px; top: 50%;
            width: 12px; height: 8px; background: #1a1a1a;
            border-radius: 50%; transform: translateY(-50%);
            filter: blur(1px);
            animation: drip 2s infinite ease-in-out;
        }

        @keyframes drip {
            0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.8; }
            50% { transform: translateY(-50%) scale(1.3); opacity: 1; filter: blur(2px); }
        }

        /* 測驗框 */
        #quiz-wrapper { display: none; max-width: 600px; margin: 20px auto; padding: 20px; }
        .quiz-step {
            background: white; padding: 40px; border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .question-text { font-size: 1.4rem; margin-bottom: 30px; font-weight: 700; line-height: 1.6; }
        .option-btn {
            width: 100%; text-align: left; padding: 18px; margin-bottom: 15px;
            border: 1px solid #eee; background: #fff; cursor: pointer;
            font-size: 1rem; font-family: 'Noto Serif TC', serif; transition: 0.3s;
        }
        .option-btn:hover { border-left: 6px solid #1a1a1a; background: #f9f7f2; }

        #result-area { display: none; text-align: center; padding: 50px; border: 2px double var(--accent-color); background: white; }
        #music-control { position: fixed; bottom: 20px; right: 20px; cursor: pointer; z-index: 100; font-size: 24px; }
    </style>
</head>
<body>

<audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3" type="audio/mpeg"></audio>
<div id="music-control" onclick="toggleMusic()">🎵</div>

<div id="landing-page">
    <div class="title-box">
        <h1 style="margin:0; font-size: 2.5rem;">人性之境</h1>
        <p style="letter-spacing: 10px; margin-top:10px;">靈 魂 考 驗</p>
    </div>
    <div class="intro-text">
        「混沌伊始，人心如白絹，亦如奔泉。<br>
        你的每一個決擇，都將如墨落紙，<br>
        漸漸洇散出靈魂真實的形狀...」
    </div>
    <button class="start-btn" onclick="startQuiz()">叩門入徑</button>
</div>

<div id="quiz-wrapper">
    <div class="progress-container" id="p-container">
        <div class="progress-text" id="progress-desc">墨落初痕...</div>
        <div class="ink-path-bg">
            <div class="ink-brush-fill" id="progress">
                <div class="ink-dot"></div>
            </div>
        </div>
    </div>

    <div id="quiz-container"></div>
    
    <div id="result-area">
        <h2 style="color:var(--accent-color)">—— 靈魂歸宿 ——</h2>
        <div id="result-content"></div>
        <button class="start-btn" onclick="location.reload()" style="margin-top:30px; font-size:1rem;">重啟輪迴</button>
    </div>
</div>

<script>
    const questions = [
        { q: "看到有人跌倒，你的第一反應是？", options: ["立刻衝過去扶", "想一下再決定", "看情況而定"], keys: ["A", "B", "C"] },
        { q: "你認為「善良」比較像什麼？", options: ["天生就有", "後天學來的", "因環境而異"], keys: ["A", "B", "C"] },
        { q: "做好事若是為了稱讚？", options: ["那不算真善", "沒關係，有做就好", "看他以後是否改變"], keys: ["A", "B", "C"] },
        { q: "政策好但只是為了選票？", options: ["動機不純非仁政", "有幫助就好", "看長期效果"], keys: ["A", "B", "C"] },
        { q: "分享筆記希望回報？", options: ["這樣不算真助人", "人之常情", "視情況而定"], keys: ["A", "B", "C"] },
        { q: "若無人知曉，你還會行善嗎？", options: ["會，本心使然", "不一定", "可能不會"], keys: ["A", "C", "B"] },
        { q: "孩童需要教導才會向善嗎？", options: ["不用，本性有善", "一定需要教化", "因材施教"], keys: ["A", "B", "C"] },
        { q: "「習慣行善」久了會變真善良嗎？", options: ["可能只是表面", "會由內而外改變", "難以斷言"], keys: ["A", "B", "C"] },
        { q: "面對誘惑時？", options: ["內心會自然抵抗", "需靠意志力克制", "隨波逐流"], keys: ["A", "B", "C"] },
        { q: "你認為「好人」最核心是？", options: ["誠摯之心", "利他行為", "審時度勢"], keys: ["A", "B", "C"] }
    ];

    let currentStep = 0;
    let scores = { A: 0, B: 0, C: 0 };
    const bgm = document.getElementById('bgm');

    function toggleMusic() {
        if (bgm.paused) bgm.play().catch(e => {});
        else bgm.pause();
    }

    function startQuiz() {
        try { bgm.play().catch(e => {}); } catch (err) {}
        document.getElementById('landing-page').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('quiz-wrapper').style.display = 'block';
            document.getElementById('p-container').style.display = 'block';
            renderQuestion();
        }, 800);
    }

    function renderQuestion() {
        if (currentStep >= questions.length) { showResult(); return; }

        const progressTexts = ["墨落初痕...", "筆意漸濃...", "渲染紙背...", "雲煙繚繞...", "心跡顯影...", "虛實交錯...", "墨韻悠長...", "霧散見真...", "餘墨尚溫...", "萬象歸原..."];
        document.getElementById('progress-desc').innerText = progressTexts[currentStep] || "靈魂拷問中...";
        
        const progressPercent = ((currentStep + 1) / questions.length) * 100;
        document.getElementById('progress').style.width = progressPercent + '%';

        const qData = questions[currentStep];
        let optionsHtml = qData.options.map((opt, i) => `<button class="option-btn" onclick="nextStep('${qData.keys[i]}')">${opt}</button>`).join('');

        document.getElementById('quiz-container').innerHTML = `
            <div class="quiz-step">
                <div style="color:#aaa; margin-bottom:10px; font-size:0.9rem; letter-spacing:2px;">卷之 ${currentStep + 1}</div>
                <div class="question-text">${qData.q}</div>
                ${optionsHtml}
            </div>
        `;
    }

    function nextStep(key) {
        scores[key]++;
        currentStep++;
        renderQuestion();
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('p-container').style.display = 'none';
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        let maxKey = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        let content = "";
        if (maxKey === 'A') content = `<h3>孟子：由仁義行</h3><p>你擁有一顆赤子之心，相信良知是與生俱來的光芒。在你眼中，真誠的動機遠比華麗的結果重要。</p>`;
        else if (maxKey === 'B') content = `<h3>荀子：化性起偽</h3><p>你深知人性的複雜，相信美德是修行的結果。你重視規範、秩序與實際的影響力，是位理性的踐行者。</p>`;
        else content = `<h3>告子：性如湍水</h3><p>你如流水般不拘泥於定見，深諳環境對人的形塑。對你而言，善惡並非絕對，而是與時俱進的智慧選擇。</p>`;
        document.getElementById('result-content').innerHTML = content;
    }
</script>
</body>
</html>
